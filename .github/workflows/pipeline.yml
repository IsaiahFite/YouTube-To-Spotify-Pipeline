name: pipeline

on:
  schedule:
    - cron: "0 19 * * 0"  # Every Sunday at 1pm MT (19:00 UTC)
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  run:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg
      
      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      
      - name: Install yt-dlp PO Token provider
        run: pip install bgutil-ytdlp-pot-provider

      - name: Update yt-dlp
        run: pip install -U yt-dlp

      - name: Setup bgutil PO Token server
        run: |
          git clone https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git /home/runner/bgutil-ytdlp-pot-provider
          cd /home/runner/bgutil-ytdlp-pot-provider/server
          npm install
          npx tsc
          sleep 2
    
      - name: Verify PO Token provider
        run: yt-dlp -v "https://www.youtube.com/watch?v=Bl1C-A1dCsw" --skip-download 2>&1 | grep -i "pot\|token\|bgutil" || true
        
      - name: Run Pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          START_DATE: ${{ secrets.START_DATE }}
          FFMPEG_LOCATION: /usr/bin/ffmpeg
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: IsaiahFite/YouTube-To-Spotify-Pipeline
          PODCAST_TITLE: ${{ secrets.PODCAST_TITLE }}
          PODCAST_DESCRIPTION: ${{ secrets.PODCAST_DESCRIPTION }}
          PODCAST_LINK: ${{ secrets.PODCAST_LINK }}
          PODCAST_LANGUAGE: ${{ secrets.PODCAST_LANGUAGE }}
          PODCAST_IMAGE: ${{ secrets.PODCAST_IMAGE }}
        run: python -m src.pipeline 2>&1 | tee pipeline.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-failure-logs
          path: pipeline.log
          retention-days: 7
