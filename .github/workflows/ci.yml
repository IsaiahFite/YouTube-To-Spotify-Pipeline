name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg
          
      - name: Run ruff
        run: ruff check src

      - name: Run mypy
        run: mypy src

      - name: Run tests
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          START_DATE: ${{ secrets.START_DATE }}
          FFMPEG_LOCATION: /usr/bin/ffmpeg
          PODCAST_TITLE: ${{ secrets.PODCAST_TITLE }}
          PODCAST_DESCRIPTION: ${{ secrets.PODCAST_DESCRIPTION }}
          PODCAST_LINK: ${{ secrets.PODCAST_LINK }}
          PODCAST_LANGUAGE: ${{ secrets.PODCAST_LANGUAGE }}
          PODCAST_IMAGE: ${{ secrets.PODCAST_IMAGE }}
        run: pytest --cov=src --cov-report=term-missing